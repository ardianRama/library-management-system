# =========================================================
# ENVIRONMENT VARIABLES FOR APPLICATION.PROPERTIES
# (INTELLIJ / RUN CONFIGURATION)
# =========================================================
# All values below are environment variables used by
# src/main/resources/application.properties.
#
#  They must be configured locally in your IDE, run configuration.
#
# These are NOT part of the .env file.
# The datasource values below must match the POSTGRES_*
# values defined in your .env file.

# Spring Boot database connection
SPRING_DATASOURCE_USERNAME=your_user
SPRING_DATASOURCE_PASSWORD=your_password
SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5234/your_database_name

# =========================================================
# Initial admin account credentials
# =========================================================
# Used for Spring Security login.
# Password must be at least 5 characters.
ADMIN_EMAIL=admin@example.com
ADMIN_PASSWORD=your_password

# =========================================================
# JWT configuration
# =========================================================
# Generate a secret key by running the following command
# in Git Bash or other terminal:
#
#   openssl rand -base64 32
#
# Copy the output and set it as the JWT_SECRET variable.
# This key is used to sign and verify JWT tokens.
#
JWT_SECRET=your_generated_secret_key